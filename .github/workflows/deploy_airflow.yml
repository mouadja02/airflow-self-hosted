name: 📦 Airflow Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force full rebuild?'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

jobs:
  check-skip:
    name: 🔍 Check if should skip
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.check.outputs.should-skip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check commit message
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi "from RPi\|from raspberry"; then
            echo "should-skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping workflow - commit from Raspberry Pi"
          else
            echo "should-skip=false" >> $GITHUB_OUTPUT
            echo "✅ Running workflow - commit not from Raspberry Pi"
          fi

  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    needs: check-skip
    if: needs.check-skip.outputs.should-skip == 'false'
    outputs:
      needs-rebuild: ${{ steps.filter.outputs.needs-rebuild }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed files
        id: filter
        run: |
          # Infrastructure files that require rebuild
          INFRA_FILES="docker-compose.yml Dockerfile airflow.cfg requirements.txt"
          
          # Get changed files
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          
          # Check if any infrastructure file changed
          NEEDS_REBUILD=false
          for file in $INFRA_FILES; do
            if echo "$CHANGED_FILES" | grep -q "^$file$"; then
              NEEDS_REBUILD=true
              echo "🔨 Infrastructure file changed: $file"
              break
            fi
          done
          
          if [ "$NEEDS_REBUILD" = true ] || [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "needs-rebuild=true" >> $GITHUB_OUTPUT
            echo "✅ Full rebuild required"
          else
            echo "needs-rebuild=false" >> $GITHUB_OUTPUT
            echo "✅ Only code changes - sync only"
          fi

  test:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest
    needs: [check-skip, detect-changes]
    if: needs.check-skip.outputs.should-skip == 'false' && needs.detect-changes.outputs.needs-rebuild == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          ALPHAVANTAGE_API_KEYS: ${{ secrets.ALPHAVANTAGE_API_KEYS }}
        run: |
          touch .env
          echo "AIRFLOW_UID=1000" >> .env
          echo "_AIRFLOW_WWW_USER_USERNAME=${{ secrets._AIRFLOW_WWW_USER_USERNAME }}" >> .env
          echo "_AIRFLOW_WWW_USER_PASSWORD=${{ secrets._AIRFLOW_WWW_USER_PASSWORD }}" >> .env
          echo "SNOWFLAKE_ACCOUNT=${{ secrets.SNOWFLAKE_ACCOUNT }}" >> .env
          echo "SNOWFLAKE_USER=${{ secrets.SNOWFLAKE_USER }}" >> .env
          echo "SNOWFLAKE_PASSWORD=${{ secrets.SNOWFLAKE_PASSWORD }}" >> .env
          echo "SNOWFLAKE_WAREHOUSE=${{ secrets.SNOWFLAKE_WAREHOUSE }}" >> .env
          echo "SNOWFLAKE_DATABASE=${{ secrets.SNOWFLAKE_DATABASE }}" >> .env
          echo "SNOWFLAKE_SCHEMA=${{ secrets.SNOWFLAKE_SCHEMA }}" >> .env
          echo "SNOWFLAKE_ROLE=${{ secrets.SNOWFLAKE_ROLE }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env
          echo "PINECONE_SF_INDEX_NAME=${{ secrets.PINECONE_SF_INDEX_NAME }}" >> .env
          echo "PINECONE_AWS_INDEX_NAME=${{ secrets.PINECONE_AWS_INDEX_NAME }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "GITHUB_TOKEN=${{ secrets.TOKEN }}" >> .env
          echo "FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}" >> .env
          echo "CRYPTOCOMPARE_API_KEY=${{ secrets.CRYPTOCOMPARE_API_KEY }}" >> .env
          echo "GUARDIAN_API_KEY=${GUARDIAN_API_KEY}" >> .env
          echo "ALPHAVANTAGE_API_KEYS=${ALPHAVANTAGE_API_KEYS}" >> .env

      - name: Build and Start Containers
        run: |
          echo "🔨 Building Docker containers..."
          docker compose up -d --build --quiet-pull 2>&1 | grep -v "Pulling\|Download\|Extracting\|Waiting" || true
          echo "✅ Containers started"

      - name: Wait for Healthchecks
        id: healthcheck
        run: |
          echo "⏳ Waiting for services to initialize..."
          sleep 60 
          
          for i in {1..6}; do
            UNHEALTHY=$(docker compose ps --services | xargs -I {} docker inspect --format '{{.State.Health.Status}}' $(docker compose ps -q {}) 2>/dev/null | grep -v "healthy" || true)
            
            if [ -z "$UNHEALTHY" ]; then
              echo "✅ All services are healthy!"
              exit 0
            fi
            echo "⏳ Services not healthy yet... waiting 10s (attempt $i/6)"
            sleep 10
          done
          
          echo "❌ Timed out waiting for services to be healthy."
          docker compose ps
          docker compose logs --tail=50
          exit 1

      - name: Stop Containers
        if: always()
        run: docker compose down -v --remove-orphans

  deploy-dags-only:
    name: 🚀 Sync Changes Only
    runs-on: ubuntu-latest
    needs: [check-skip, detect-changes]
    if: needs.check-skip.outputs.should-skip == 'false' && needs.detect-changes.outputs.needs-rebuild == 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared & SSH Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          curl -sL https://pkg.cloudflare.com/cloudflare-main.gpg | sudo tee /usr/share/keyrings/cloudflare-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-archive-keyring.gpg] https://pkg.cloudflare.com/cloudflared $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflared.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq cloudflared > /dev/null 2>&1
          echo "✅ Tools installed"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host ssh.mj-dev.net
            User ${{ secrets.RASPBERRY_PI_USER }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          EOF
          chmod 600 ~/.ssh/config

      - name: Quick DAG Sync
        env:
          SSH_PASS: ${{ secrets.RASPBERRY_PI_PASSWORD }}
        run: |
          echo "📂 Syncing changes only (no container rebuild)..."

          cat <<'EOF' > sync_changes.sh
          #!/bin/bash
          set -e

          echo "📂 Navigating to project..."
          cd ${{ secrets.AIRFLOW_PATH }}
          
          # Configure git safe directory
          git config --global --add safe.directory ${{ secrets.AIRFLOW_PATH }}
          git remote set-url origin https://${{ secrets.TOKEN }}@github.com/mouadja02/airflow-self-hosted.git

          echo "⬇️ Fetching latest changes first..."
          git fetch origin main

          echo "⬆️ Checking for RPi changes..."
          git add .

          if [ -n "$(git status --porcelain)" ]; then
            echo "📝 Local changes detected. Stashing and pulling..."
            git stash
            git pull origin main
            echo "📝 Re-applying local changes and committing..."
            git stash pop || true
            git add .
            git commit -m "[from RPi] Updated dataset_updater DAG" || true
            git push origin main
          else
            echo "✨ No local changes to commit."
            git pull origin main
          fi

          echo "⚙️ Restarting containers..."
          docker compose restart

          echo "✅ Changes synced! Airflow will pick them up automatically."
          rm -f /tmp/sync_changes.sh
          EOF

          echo "📤 Uploading sync script..."
          sshpass -p "$SSH_PASS" scp sync_changes.sh ssh.mj-dev.net:/tmp/

          echo "🚀 Executing sync..."
          sshpass -p "$SSH_PASS" ssh ssh.mj-dev.net "bash /tmp/sync_changes.sh"
          
  deploy-full:
    name: 🚀 Full Rebuild & Deploy
    runs-on: ubuntu-latest
    needs: [check-skip, detect-changes, test]
    if: needs.check-skip.outputs.should-skip == 'false' && needs.detect-changes.outputs.needs-rebuild == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared & SSH Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          curl -sL https://pkg.cloudflare.com/cloudflare-main.gpg | sudo tee /usr/share/keyrings/cloudflare-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-archive-keyring.gpg] https://pkg.cloudflare.com/cloudflared $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflared.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq cloudflared > /dev/null 2>&1
          echo "✅ Tools installed"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host ssh.mj-dev.net
            User ${{ secrets.RASPBERRY_PI_USER }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          EOF
          chmod 600 ~/.ssh/config

      - name: Prepare Deployment Files
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          ALPHAVANTAGE_API_KEYS: ${{ secrets.ALPHAVANTAGE_API_KEYS }}
        run: |
          # Create the .env file
          echo "AIRFLOW_UID=1000" > .env
          echo "_AIRFLOW_WWW_USER_USERNAME=${{ secrets._AIRFLOW_WWW_USER_USERNAME }}" >> .env
          echo "_AIRFLOW_WWW_USER_PASSWORD=${{ secrets._AIRFLOW_WWW_USER_PASSWORD }}" >> .env
          echo "SNOWFLAKE_ACCOUNT=${{ secrets.SNOWFLAKE_ACCOUNT }}" >> .env
          echo "SNOWFLAKE_USER=${{ secrets.SNOWFLAKE_USER }}" >> .env
          echo "SNOWFLAKE_PASSWORD=${{ secrets.SNOWFLAKE_PASSWORD }}" >> .env
          echo "SNOWFLAKE_WAREHOUSE=${{ secrets.SNOWFLAKE_WAREHOUSE }}" >> .env
          echo "SNOWFLAKE_DATABASE=${{ secrets.SNOWFLAKE_DATABASE }}" >> .env
          echo "SNOWFLAKE_SCHEMA=${{ secrets.SNOWFLAKE_SCHEMA }}" >> .env
          echo "SNOWFLAKE_ROLE=${{ secrets.SNOWFLAKE_ROLE }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env
          echo "PINECONE_SF_INDEX_NAME=${{ secrets.PINECONE_SF_INDEX_NAME }}" >> .env
          echo "PINECONE_AWS_INDEX_NAME=${{ secrets.PINECONE_AWS_INDEX_NAME }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "GITHUB_TOKEN=${{ secrets.TOKEN }}" >> .env
          echo "FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}" >> .env
          echo "CRYPTOCOMPARE_API_KEY=${{ secrets.CRYPTOCOMPARE_API_KEY }}" >> .env
          echo "FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}" >> .env
          echo "GUARDIAN_API_KEY=${GUARDIAN_API_KEY}" >> .env
          echo "ALPHAVANTAGE_API_KEYS=${ALPHAVANTAGE_API_KEYS}" >> .env

          # Create deployment script
          cat <<'EOF' > deploy_script.sh
          #!/bin/bash
          set -e
          
          echo "📂 Navigating to project..."
          cd ${{ secrets.AIRFLOW_PATH }}

          # Configure git safe directory
          git config --global --add safe.directory ${{ secrets.AIRFLOW_PATH }}

          echo "⬇️ Pulling latest changes..."
          git remote set-url origin https://${{ secrets.TOKEN }}@github.com/mouadja02/airflow-self-hosted.git
          git pull origin main

          echo "🔐 Moving new .env file into place..."
          mv /tmp/.env .

          echo "🐳 Rebuilding and restarting containers..."
          docker compose up -d --build --force-recreate --remove-orphans 2>&1 | \
            grep -vE "Pulling|Download|Extracting|Waiting|Pull complete|Already exists|sha256" | \
            grep -E "ERROR|WARNING|Building|Built|Created|Started|^$" || true

          echo "🧹 Cleaning up..."
          docker image prune -f > /dev/null 2>&1
          rm -f /tmp/deploy_script.sh
          
          echo "✅ Full Deployment Successfully Completed!"
          EOF

      - name: Transfer and Execute
        env:
          SSH_PASS: ${{ secrets.RASPBERRY_PI_PASSWORD }}
        run: |
          echo "📤 Uploading files to Raspberry Pi..."
          sshpass -p "$SSH_PASS" scp .env deploy_script.sh ssh.mj-dev.net:/tmp/

          echo "🚀 Executing full deployment..."
          sshpass -p "$SSH_PASS" ssh ssh.mj-dev.net "bash /tmp/deploy_script.sh"